<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CardioProtect DSS v5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080c14;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
select{background:#0f1520;color:#fff;border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:10px 14px;width:100%;font-size:13px;outline:none;appearance:none;-webkit-appearance:none;margin-bottom:4px}
input[type=range]{width:100%;margin:4px 0 2px}
button{cursor:pointer;font-family:inherit;border:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.card{padding:16px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);margin-bottom:16px}
.sh{font-size:10px;color:rgba(255,255,255,0.28);text-transform:uppercase;letter-spacing:.12em;margin-bottom:14px}
.lbl{font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px;margin-top:10px}
.tabs{display:flex;margin:0 0 16px;border-radius:10px;background:rgba(255,255,255,0.05);padding:4px}
.tab{flex:1;padding:9px;border-radius:8px;border:none;font-size:13px;font-weight:600;background:transparent;color:rgba(255,255,255,0.38);transition:all .3s}
.tab.on{background:rgba(255,255,255,0.12);color:#fff}
.runbtn{width:100%;padding:16px;border-radius:12px;background:linear-gradient(135deg,#2a7fe0,#2ac47f);color:#fff;font-size:15px;font-weight:700;box-shadow:0 4px 30px rgba(42,127,224,0.4);margin-top:4px}
.chip{padding:6px 13px;border-radius:20px;font-size:11px;font-weight:500;background:transparent}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.modal{background:#0f1117;border-radius:16px;padding:20px;max-width:500px;width:100%;max-height:88vh;overflow-y:auto}
.chk{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;user-select:none;color:rgba(255,255,255,0.5)}
.chk.on{color:#fff}
.rline{font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:4px;padding-left:12px;border-left:2px solid rgba(255,255,255,0.15);display:block}
.info-banner{padding:12px 14px;border-radius:10px;background:rgba(42,127,224,0.1);border:1px solid rgba(42,127,224,0.3);font-size:12px;color:rgba(255,255,255,0.65);margin-bottom:8px;line-height:1.6}
.info-banner.warn{background:rgba(240,180,41,0.1);border-color:rgba(240,180,41,0.3);color:#f0b429}
.info-banner.green{background:rgba(42,196,127,0.1);border-color:rgba(42,196,127,0.3);color:#2ac47f}
.info-banner.red{background:rgba(224,92,42,0.12);border-color:rgba(224,92,42,0.4);color:#e05c2a}
.fade-in{animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root" style="max-width:520px;margin:0 auto;padding:0 20px"></div>

<script>
// ── PROTOCOLS ──────────────────────────────────────────────────────────────
var P = {
  calafiore:{
    label:"Calafiore (тёплая кровяная)",color:"#e05c2a",icon:"🩸",
    comp:[
      ["Основа","Аутологичная кровь 4:1"],
      ["KCl индукция","20 мэкв/л"],
      ["KCl поддержание","8 мэкв/л"],
      ["NaHCO₃","по BE"],
      ["Температура","37°C или 29–32°C"],
      ["Осмолярность","~340 мОсм/кг"]
    ],
    dos:[
      ["Индукция","10–15 мл/кг","80–100 мм рт.ст., до остановки"],
      ["Редозирование","5–10 мл/кг","каждые 20–25 мин"],
      ["Реперфузия","2–4 мл/кг","тёплая, без K+"],
      ["⚠️ Максимум ишемии","≤60 мин","При ишемии >60 мин — переход на Del Nido или Кустодиол"]
    ],
    adv:[
      "АКШ с малым числом шунтов и ишемией ≤60 мин",
      "Физиологичная оксигенация миокарда",
      "Нет гемодилюции",
      "Нормотермия: редозы каждые 20–25 мин"
    ],
    lim:[
      "Ишемия >60 мин — НЕ РЕКОМЕНДОВАН",
      "Не для мини-доступа",
      "Нагрузка K+ при ХБП и ХСН",
      "ХБП С4–С5 (СКФ <30): ПРОТИВОПОКАЗАН — риск фатальной гиперкалиемии",
      "Не для экстренных декомпенсированных операций",
      "Не для педиатрии"
    ]
  },
  delNido:{
    label:"Del Nido",color:"#2a7fe0",icon:"💎",
    comp:[
      ["Ионоплазм В (Ionoplasmal B)","1000 мл"],
      ["Кровь","250 мл (4:1)"],
      ["MgSO₄","2 г"],
      ["Лидокаин","130 мг"],
      ["KCl","2 мэкв"],
      ["NaHCO₃","13 мэкв"],
      ["Маннитол","3,26 г"],
      ["Температура","4–8°C"],
      ["Примечание","Ионоплазм В заменяет Плазмалит А как изотонический сбалансированный носитель"]
    ],
    dos:[
      ["Единственная доза","20 мл/кг (max 1000 мл)","200–250 мм рт.ст., 3–5 мин"],
      ["Редоз при ишемии >90 мин","10 мл/кг","50% от первичной дозы"],
      ["Мини-доступ + VACS","20 мл/кг","200–250 мм рт.ст., с вакуумным усилением"],
      ["⚠️ Максимум ишемии","90–120 мин","При ишемии >120 мин — переход на Кустодиол"]
    ],
    adv:[
      "Одна доза покрывает 90–120 мин ишемии",
      "Лидокаин: стабилизация мембраны, защита от аритмий",
      "Магний: антагонист Ca²+, цитопротекция",
      "Ионоплазм В: физиологичный носитель без риска ацидоза",
      "Оптимален при мини-доступе с VACS",
      "Выбор ~85% хирургов ОКБ №1 при мини-операциях"
    ],
    lim:[
      "Ишемия >120 мин — НЕ РЕКОМЕНДОВАН (переход на Кустодиол)",
      "Не для нормотермии",
      "Объём 1000 мл — следить за гемодилюцией",
      "ХБП С4–С5 (СКФ <30): ПРОТИВОПОКАЗАН — маннитол создаёт осмотическую нагрузку на повреждённые почки; гиперкалиемия при сниженном клиренсе K+",
      "Не для экстренных декомпенсированных операций >120 мин"
    ]
  },
  custodiol:{
    label:"Кустодиол (HTK)",color:"#2ac47f",icon:"🧬",
    comp:[
      ["Гистидин","198 ммоль/л"],
      ["Триптофан","2 ммоль/л"],
      ["Кетоглутарат","1 ммоль/л"],
      ["Маннитол","30 ммоль/л"],
      ["KCl","9 мэкв/л"],
      ["MgCl₂","4 ммоль/л"],
      ["Температура","4–6°C"]
    ],
    dos:[
      ["Взрослые","20–30 мл/кг (мин. 1000 мл)","30–50 мм рт.ст., 6–8 мин"],
      ["Длительные операции >120 мин","30 мл/кг","Однократно, без редозов до 3–4 ч"],
      ["Экстренная / декомпенсированная","25–30 мл/кг","Быстрая индукция остановки, максимальная защита"],
      ["Мини-доступ + VACS","20–25 мл/кг","30–50 мм рт.ст., 6–8 мин"],
      ["Повторная защита >180 мин","500–1000 мл","При необходимости"]
    ],
    adv:[
      "Защита до 3–4 ч без редозирования",
      "Стандарт при длительных и экстренных операциях",
      "Надёжен при ретроградном введении (КС)",
      "Оптимален при тяжёлой декомпенсации и ГЛЖ",
      "Применим при мини-доступе с VACS",
      "ПРЕПАРАТ ВЫБОРА при ХБП С4–С5 — низкий K+ (9 мэкв/л), однократный болюс, гистидин метаболизируется печенью"
    ],
    lim:[
      "Большой объём → гемодилюция (следить за Hct)",
      "Не для нормотермии",
      "Нет кислородной доставки (нет крови)",
      "Медленная индукция остановки (6–8 мин)"
    ]
  }
};

// ── OPERATION GROUPS ──────────────────────────────────────────────────────
var OP_SECTIONS = {
  cabg:        ["lv","valve_ar","perfusion","comorbid","coronary","shunts","urgency","hr"],
  avr:         ["lv","valve_as","valve_ar","perfusion","comorbid","urgency","hr"],
  mvr:         ["lv","valve_ar","perfusion","comorbid","urgency","hr"],
  combined:    ["lv","valve_as","valve_ar","perfusion","comorbid","coronary","urgency","hr"],
  aorta:       ["lv","valve_ar","perfusion","comorbid","urgency","hr"],
  redo:        ["lv","valve_ar","perfusion","comorbid","urgency","hr"],
  myectomy:    ["lv","valve_as","valve_ar","perfusion","comorbid","urgency","hr"],
  mini_mitral: ["lv","valve_ar","perfusion","comorbid","urgency","hr"],
  mini_avr:    ["lv","valve_as","valve_ar","perfusion","comorbid","urgency","hr"],
  mini_bentall:["lv","valve_as","valve_ar","perfusion","comorbid","urgency","hr"]
};

var MINI_OPS = ["mini_mitral","mini_avr","mini_bentall"];

// ── STATE ──────────────────────────────────────────────────────────────────
var S = {
  tab:"input", modal:null, result:null,
  f:{
    op:"cabg",
    urgency:"elective",
    ef:55, lvm:"none",
    as_grad:"none",
    isch:60, ar:"none",
    gfr:75, temp:"mild",
    dm:false, mi:false, ped:false,
    hf:false, ckd:false, athero:false, prev_cardiac:false,
    coronary_stenosis:"none",
    shunts:"none",
    vacuum:false,
    hr:70
  }
};

// ── HELPERS: ХБП стадия по СКФ ────────────────────────────────────────────
function ckdStage(gfr){
  if(gfr<15)  return 5;
  if(gfr<30)  return 4;
  if(gfr<45)  return "3b";
  if(gfr<60)  return "3a";
  if(gfr<90)  return 2;
  return 1;
}
function ckdLabel(gfr){
  var st=ckdStage(gfr);
  if(st===5)    return "ХБП С5 (диализ/преддиализ)";
  if(st===4)    return "ХБП С4";
  if(st==="3b") return "ХБП С3б";
  if(st==="3a") return "ХБП С3а";
  if(st===2)    return "ХБП С2";
  return "Норма";
}

// ── SCORE ──────────────────────────────────────────────────────────────────
function score(f) {
  var s={calafiore:0,delNido:0,custodiol:0};
  var r={calafiore:[],delNido:[],custodiol:[]};
  var w=[]; var ci={calafiore:[],delNido:[],custodiol:[]};
  var opcab=false;
  var forceCustodiol=false;
  var miniOp = MINI_OPS.indexOf(f.op) !== -1;

  // ── КРИТИЧЕСКИЙ ФЛАГ: ХБП С4–С5 (СКФ <30) ────────────────────────────
  var ckdSevere = (f.gfr < 30); // С4 (15–29) или С5 (<15)

  function add(k,n,t){s[k]+=n;r[k].push(t);}
  function sub(k,n,t){s[k]=Math.max(0,s[k]-n);r[k].push(t);}
  function con(k,t){ci[k].push(t);}
  function warn(t){w.push(t);}

  // ── ХБП С4–С5: ЖЁСТКОЕ ПРОТИВОПОКАЗАНИЕ ─────────────────────────────
  // Обрабатываем ПЕРВЫМ — до всех других правил,
  // чтобы противопоказание не было перекрыто другими очками.
  if(ckdSevere){
    var ckdLbl = ckdLabel(f.gfr);
    // Calafiore противопоказан
    con("calafiore", ckdLbl+" (СКФ "+f.gfr+" мл/мин): ПРОТИВОПОКАЗАН — многократные редозы K+ (20 мэкв/л) при нарушенном почечном клиренсе → риск фатальной гиперкалиемии");
    // Del Nido противопоказан
    con("delNido",   ckdLbl+" (СКФ "+f.gfr+" мл/мин): ПРОТИВОПОКАЗАН — маннитол (осмотическая нагрузка при СКФ <30) + K+ 20 мэкв/л при индукции → риск гиперкалиемии и ухудшения ОПП");
    // Кустодиол — препарат выбора
    add("custodiol", 6, ckdLbl+": ПРЕПАРАТ ВЫБОРА — K+ минимальный (9 мэкв/л), однократный болюс без накопления, гистидиновый буфер метаболизируется печенью без почечной экскреции");
    warn("🔴 ХБП "+ckdLbl+" (СКФ "+f.gfr+"): Del Nido и Calafiore ПРОТИВОПОКАЗАНЫ. Единственный выбор — Кустодиол (HTK)");
    if(f.gfr<15){
      warn("⚠️ ХБП С5 / преддиализ: диализ накануне операции обязателен. K+ перед ИК ≤5,0 мэкв/л. Ультрафильтрация на ИК. Кустодиол 20–25 мл/кг — не превышать из-за объёмной нагрузки");
    } else {
      warn("⚠️ ХБП С4 (СКФ 15–29): K+ каждые 20 мин на ИК. Готовность к ультрафильтрации. Объём Кустодиола не более 25 мл/кг. Контроль Mg²+, лактата, диуреза");
    }
  }

  // ── ЭКСТРЕННОСТЬ / ДЕКОМПЕНСАЦИЯ ────────────────────────────────────────
  var isEmergency = (f.urgency==="emergency" || f.urgency==="decompensated");
  if(isEmergency){
    forceCustodiol=true;
    add("custodiol",8,"Экстренная/декомпенсированная операция: Кустодиол — единственный выбор. Максимальная защита при нестабильной гемодинамике, нет риска от частых редозов");
    con("calafiore","Экстренная/декомпенсированная: Calafiore ПРОТИВОПОКАЗАН — непредсказуемое время ишемии, риск нарастания K+");
    con("delNido","Экстренная/декомпенсированная: Del Nido НЕ РЕКОМЕНДОВАН при непредсказуемом времени ишемии >120 мин");
    warn("🔴 ЭКСТРЕННАЯ ОПЕРАЦИЯ: Кустодиол обязателен — одноразовая защита до 3–4 ч без риска редозирования в критической ситуации");
    if(f.urgency==="decompensated"){
      warn("⚠️ Декомпенсация: ВАБК до ИК при ФВ <30%, мониторинг лактата каждые 30 мин, готовность к ЭКМО");
    }
  }

  // ── ЧСС ПЕРЕД КАРДИОПЛЕГИЕЙ ─────────────────────────────────────────────
  if(f.hr>=90 && !isEmergency){
    warn("💊 ЧСС "+f.hr+" уд/мин — высокая: рассмотреть короткодействующий β-блокатор перед подачей кардиоплегии");
    warn("💊 Эсмолол (Esmolol) 0,5–1,0 мг/кг в/в болюс или метопролол 1–2 мг в/в — снижение ЧСС до <80 уд/мин улучшает равномерность распределения кардиоплегии и предотвращает реперфузионные аритмии");
  } else if(f.hr>=80 && f.hr<90 && !isEmergency){
    warn("💊 ЧСС "+f.hr+" уд/мин — умеренно повышена: рассмотреть эсмолол 0,25–0,5 мг/кг в/в перед индукцией кардиоплегии");
  }
  if(f.hr>=90 && isEmergency){
    warn("💊 ЧСС "+f.hr+" уд/мин при экстренной операции: эсмолол 0,5 мг/кг только после стабилизации гемодинамики, осторожно при гипотензии");
  }

  // ── ОПЕРАЦИЯ ────────────────────────────────────────────────────────────
  if(!isEmergency){
    if(f.op==="cabg"){
      if(f.shunts==="simple"){
        opcab=true;
        warn("✅ Простое АКШ (1–2 шунта): операция на работающем сердце (OPCAB) — кардиоплегия не требуется");
      } else if(f.shunts==="complex"){
        if(f.isch<=60){
          if(!ckdSevere) add("calafiore",4,"АКШ сложное + ишемия ≤60 мин: Calafiore — оптимален для многососудистого шунтирования в пределах лимита");
          add("delNido",2,"АКШ сложное: Del Nido применим");
          add("custodiol",1,"АКШ сложное: Кустодиол возможен, но объём избыточен");
        } else if(f.isch<=120){
          add("delNido",ckdSevere?0:4,"АКШ сложное + ишемия 60–120 мин: Del Nido — оптимален");
          add("custodiol",2,"АКШ сложное + ишемия 60–120 мин: Кустодиол применим");
          if(!ckdSevere) con("calafiore","АКШ сложное + ишемия >60 мин: Calafiore НЕ РЕКОМЕНДОВАН — превышен лимит 60 мин");
        } else {
          add("custodiol",5,"АКШ сложное + ишемия >120 мин: Кустодиол — единственный выбор");
          if(!ckdSevere){
            con("calafiore","АКШ сложное + ишемия >120 мин: Calafiore ПРОТИВОПОКАЗАН");
            con("delNido","АКШ сложное + ишемия >120 мин: Del Nido ПРОТИВОПОКАЗАН — превышен лимит 120 мин");
          }
        }
        warn("⚠️ Сложное АКШ (≥3 шунтов): показана кардиоплегия на ИК");
      } else {
        if(f.isch<=60){
          if(!ckdSevere) add("calafiore",3,"АКШ + ишемия ≤60 мин: Calafiore оптимален");
          add("delNido",2,"АКШ: Del Nido применим");
          add("custodiol",1,"АКШ: Кустодиол применим");
        } else {
          if(!ckdSevere) add("delNido",3,"АКШ + ишемия >60 мин: Del Nido предпочтителен");
          add("custodiol",2,"АКШ: Кустодиол применим");
          if(!ckdSevere) con("calafiore","АКШ + ишемия >60 мин: Calafiore НЕ РЕКОМЕНДОВАН");
        }
      }
    }
    else if(f.op==="avr"){
      if(f.isch<=120){
        if(!ckdSevere) add("delNido",3,"АВР + ишемия ≤120 мин: Del Nido оптимален — одна доза, отличный доступ");
        add("custodiol",3,"АВР: Кустодиол — стандарт при изолированной патологии АК");
        con("calafiore","АВР: Calafiore НЕ РЕКОМЕНДОВАН — применим только при АКШ и малых окклюзиях ≤60 мин");
      } else {
        add("custodiol",5,"АВР + ишемия >120 мин: Кустодиол обязателен");
        con("calafiore","АВР + ишемия >120 мин: Calafiore ПРОТИВОПОКАЗАН");
        if(!ckdSevere) con("delNido","АВР + ишемия >120 мин: Del Nido НЕ РЕКОМЕНДОВАН");
      }
    }
    else if(f.op==="mvr"){
      if(f.isch<=120){
        if(!ckdSevere) add("delNido",3,"МВР + ишемия ≤120 мин: Del Nido — оптимален");
        add("custodiol",2,"МВР: Кустодиол при изолированной патологии МК");
        con("calafiore","МВР: Calafiore НЕ РЕКОМЕНДОВАН — только АКШ с ишемией ≤60 мин");
      } else {
        add("custodiol",5,"МВР + ишемия >120 мин: Кустодиол обязателен");
        con("calafiore","МВР: Calafiore ПРОТИВОПОКАЗАН");
        if(!ckdSevere) con("delNido","МВР + ишемия >120 мин: Del Nido НЕ РЕКОМЕНДОВАН");
      }
    }
    else if(f.op==="combined"){
      if(f.isch>120){
        add("custodiol",5,"Сочетанная + ишемия >120 мин: Кустодиол обязателен");
        con("calafiore","Сочетанная + ишемия >120 мин: Calafiore ПРОТИВОПОКАЗАН");
        if(!ckdSevere) con("delNido","Сочетанная + ишемия >120 мин: Del Nido ПРОТИВОПОКАЗАН");
      } else {
        if(!ckdSevere) add("delNido",3,"Сочетанная + ишемия ≤120 мин: Del Nido — гибкое управление ишемией");
        add("custodiol",2,"Сочетанная: Кустодиол применим");
        con("calafiore","Сочетанная: Calafiore НЕ РЕКОМЕНДОВАН — только АКШ ≤60 мин");
      }
    }
    else if(f.op==="aorta"){
      add("custodiol",5,"Хирургия аорты: Кустодиол — золотой стандарт, защита 3–4 ч");
      if(!ckdSevere) add("delNido",f.isch<=120?2:0,"Хирургия аорты: Del Nido при умеренной продолжительности ≤120 мин");
      con("calafiore","Хирургия аорты: Calafiore ПРОТИВОПОКАЗАН — только АКШ ≤60 мин");
    }
    else if(f.op==="redo"){
      add("custodiol",4,"Повторная: Кустодиол — ретроградное введение надёжно при спайках, нет редозов");
      if(!ckdSevere) add("delNido",f.isch<=120?2:0,"Повторная + ишемия ≤120 мин: Del Nido возможен");
      con("calafiore","Повторная: Calafiore НЕ РЕКОМЕНДОВАН — только АКШ ≤60 мин");
    }
    else if(f.op==="myectomy"){
      if(f.isch>120){
        add("custodiol",6,"Миоэктомия + ишемия >120 мин: Кустодиол обязателен — глубокое проникновение в гипертрофированный МЖП, защита 3–4 ч");
        if(!ckdSevere) con("delNido","Миоэктомия + ишемия >120 мин: Del Nido НЕ РЕКОМЕНДОВАН — превышен лимит 120 мин");
        con("calafiore","Миоэктомия + ишемия >120 мин: Calafiore ПРОТИВОПОКАЗАН");
      } else if(f.isch>60){
        add("custodiol",5,"Миоэктомия + ишемия 60–120 мин: Кустодиол предпочтителен — равномерная защита гипертрофированного МЖП");
        if(!ckdSevere) add("delNido",3,"Миоэктомия + ишемия 60–120 мин: Del Nido — лидокаин важен при высоком риске аритмий при ГКМП");
        con("calafiore","Миоэктомия: Calafiore НЕ РЕКОМЕНДОВАН — неравномерное распределение в гипертрофированном МЖП");
      } else {
        add("custodiol",4,"Миоэктомия + ишемия ≤60 мин: Кустодиол — надёжная защита при ГКМП");
        if(!ckdSevere) add("delNido",3,"Миоэктомия + ишемия ≤60 мин: Del Nido — лидокаин стабилизирует дезорганизованные миофибриллы");
        con("calafiore","Миоэктомия: Calafiore НЕ РЕКОМЕНДОВАН — частые редозы K+ при массивной ГЛЖ МЖП");
      }
      warn("🫀 ГКМП / Миоэктомия Morrow: массивная ГЛЖ МЖП — увеличить объём кардиоплегии на 20–25%; ретроградный путь через КС обязателен для равномерной защиты МЖП");
      warn("⚡ ГКМП: высокий риск желудочковых аритмий при реперфузии — лидокаин (Del Nido) или амиодарон превентивно; дефибриллятор наготове");
      warn("⚠️ Гипердинамическая ФВ при ГКМП: не ориентироваться на ФВ как показатель функции — миокард метаболически истощён несмотря на высокую ФВ");
    }
    else if(f.op==="mini_mitral"){
      if(!ckdSevere) add("delNido",5,"Мини-митральный: Del Nido — выбор ~85% хирургов ОКБ №1; одна доза, VACS");
      add("custodiol",2,"Мини-митральный: Кустодиол — применяется (1 хирург ОКБ №1)");
      con("calafiore","Мини-митральный: Calafiore ПРОТИВОПОКАЗАН — только АКШ ≤60 мин, не для мини-доступа");
      warn("🔧 Мини-доступ: VACS — обязательно. Умеренная гипотермия 32–34°C — обязательна");
      warn("⚠️ Периферическое ИК: учитывать ретроградный поток при бедренной канюляции");
    }
    else if(f.op==="mini_avr"){
      if(!ckdSevere) add("delNido",5,"Мини-АВР: Del Nido — выбор ~85% хирургов ОКБ №1; мини-J-стернотомия");
      add("custodiol",2,"Мини-АВР: Кустодиол — применяется (1 хирург ОКБ №1)");
      con("calafiore","Мини-АВР: Calafiore ПРОТИВОПОКАЗАН — только АКШ ≤60 мин, не для мини-доступа");
      warn("🔧 VACS — обязательно. Умеренная гипотермия 32–34°C — обязательна");
      warn("⚠️ Ограниченная канюляция аорты: обеспечить адекватный дебит кардиоплегии");
    }
    else if(f.op==="mini_bentall"){
      if(f.isch>120){
        add("custodiol",5,"Мини-Бенталл + ишемия >120 мин: Кустодиол обязателен");
        warn("⏱️ Мини-Бенталл >120 мин: Кустодиол обязателен, Del Nido исключён");
      } else {
        if(!ckdSevere) add("delNido",5,"Мини-Бенталл ≤120 мин: Del Nido — предпочтение ~85% хирургов ОКБ №1");
        add("custodiol",3,"Мини-Бенталл: Кустодиол — применяется (1 хирург ОКБ №1)");
      }
      con("calafiore","Мини-Бенталл: Calafiore ПРОТИВОПОКАЗАН");
      warn("🔧 VACS — обязательно. Умеренная гипотермия 32–34°C — обязательна");
      warn("⚠️ Прямая канюляция коронарных устьев после иссечения корня аорты");
    }
  }

  // ── ФВ ──────────────────────────────────────────────────────────────────
  if(!opcab && !forceCustodiol){
    if(f.ef<30){
      add("custodiol",3,"ФВ <30%: Кустодиол — гипотермическая защита при критической дисфункции");
      if(!ckdSevere) add("delNido",2,"ФВ <30%: Del Nido — лидокаин+магний, защита гибернированного миокарда");
      con("calafiore","ФВ <30%: Calafiore НЕ РЕКОМЕНДОВАН при критической дисфункции");
      warn("⚠️ ФВ <30%: рассмотреть ВАБК, мониторинг лактата, готовность к ЭКМО");
    } else if(f.ef<45){
      if(!ckdSevere) add("delNido",2,"ФВ 30–45%: Del Nido надёжен при умеренной дисфункции");
      add("custodiol",2,"ФВ 30–45%: Кустодиол приемлем");
    } else {
      if(!ckdSevere) add("delNido",1,"ФВ ≥45%: Del Nido применим");
      add("custodiol",1,"ФВ ≥45%: Кустодиол применим");
      if(f.op==="cabg" && f.isch<=60 && !ckdSevere){
        add("calafiore",2,"ФВ ≥45% + АКШ ≤60 мин: Calafiore оптимален");
      }
    }
  }

  // ── ГЛЖ ─────────────────────────────────────────────────────────────────
  if(!opcab && !forceCustodiol){
    if(f.lvm==="severe"){
      add("custodiol",3,"Выраженная ГЛЖ: Кустодиол — глубокая гипотермия, надёжная защита гипертрофированного миокарда");
      if(!ckdSevere) add("delNido",3,"Выраженная ГЛЖ: Del Nido — лидокаин критически важен");
      warn("⚠️ ГЛЖ >200 г/м²: увеличить объём кардиоплегии; интервалы редозирования сократить");
    } else if(f.lvm==="moderate"){
      if(!ckdSevere) add("delNido",2,"Умеренная ГЛЖ: Del Nido предпочтителен");
      add("custodiol",1,"Умеренная ГЛЖ: Кустодиол применим");
    }
  }

  // ── СТЕНОЗ АК ───────────────────────────────────────────────────────────
  if(f.as_grad && f.as_grad!=="none" && !opcab && !forceCustodiol){
    if(f.as_grad==="critical"){
      add("custodiol",3,"Критический стеноз АК: Кустодиол — прямая канюляция устьев после иссечения клапана");
      if(!ckdSevere) add("delNido",3,"Критический стеноз АК: Del Nido — прямая канюляция устьев");
      warn("⚠️ Критический АС: антеградная доставка через клапан невозможна — прямая канюляция устьев после иссечения");
    } else if(f.as_grad==="severe"){
      add("custodiol",2,"Тяжёлый стеноз АК: Кустодиол — оптимален после иссечения клапана");
      if(!ckdSevere) add("delNido",2,"Тяжёлый стеноз АК: Del Nido с прямой канюляцией или ретроградно");
      warn("⚠️ Тяжёлый АС: рассмотреть ретроградный путь до пережатия аорты");
    } else if(f.as_grad==="moderate"){
      if(!ckdSevere) add("delNido",1,"Умеренный стеноз АК: Del Nido — антеградный путь возможен");
      add("custodiol",1,"Умеренный стеноз АК: Кустодиол применим");
    }
  }

  // ── АР ──────────────────────────────────────────────────────────────────
  if(!opcab && !forceCustodiol){
    if(f.ar==="severe"){
      add("custodiol",3,"АР 3–4 ст.: Кустодиол — ретроградная перфузия через КС");
      if(!ckdSevere) add("delNido",2,"АР 3–4 ст.: Del Nido — прямая канюляция устьев");
      con("calafiore","АР 3–4 ст.: антеградное введение неэффективно — вымывание в ЛЖ");
      warn("⚠️ Тяжёлая АР: антеградный путь не рекомендован — только ретроград или прямая канюляция");
    } else if(f.ar==="moderate"){
      add("custodiol",1,"АР 2 ст.: предпочтителен ретроградный путь");
      if(!ckdSevere) add("delNido",1,"АР 2 ст.: Del Nido с осторожностью антеградно");
    } else {
      if(!miniOp && !ckdSevere){
        add("delNido",1,"АР нет/1 ст.: стандартный Del Nido антеградно");
        add("custodiol",1,"АР нет/1 ст.: Кустодиол антеградно");
        if(f.op==="cabg" && f.isch<=60) add("calafiore",1,"АР нет/1 ст. + АКШ ≤60 мин: Calafiore антеградно");
      } else if(!miniOp && ckdSevere){
        add("custodiol",1,"АР нет/1 ст.: Кустодиол антеградно");
      }
    }
  }

  // ── СТЕНОЗЫ КА ──────────────────────────────────────────────────────────
  if(f.coronary_stenosis && f.coronary_stenosis!=="none" && !opcab && !forceCustodiol){
    if(f.coronary_stenosis==="proximal_severe"){
      add("custodiol",2,"Проксимальный стеноз КА >90%: Кустодиол ретроградно через КС — надёжная защита дистального миокарда");
      if(!ckdSevere) add("delNido",2,"Проксимальный стеноз КА >90%: Del Nido ретроградно или прямая канюляция");
      if(!ckdSevere) sub("calafiore",1,"Проксимальный стеноз КА: антеградная доставка неравномерна — зона риска");
      warn("⚠️ Проксимальный стеноз >90%: ретроградная кардиоплегия через КС — равномерная защита дистального миокарда");
    } else if(f.coronary_stenosis==="multi_vessel"){
      add("custodiol",2,"Многосостиной стеноз: ретроградная подача — равномерная перфузия");
      if(!ckdSevere) add("delNido",1,"Многосостиной стеноз: Del Nido возможен");
      warn("⚠️ Многосостиной стеноз: комбинированный антеградно-ретроградный путь — оптимальная защита");
    } else if(f.coronary_stenosis==="moderate"){
      if(!ckdSevere) add("delNido",1,"Умеренный стеноз КА: Del Nido применим");
      add("custodiol",1,"Умеренный стеноз КА: Кустодиол применим");
      if(f.op==="cabg" && f.isch<=60 && !ckdSevere) add("calafiore",1,"Умеренный стеноз КА + АКШ ≤60 мин: Calafiore применим");
    }
  }

  // ── ИШЕМИЯ ──────────────────────────────────────────────────────────────
  if(!opcab && !forceCustodiol){
    if(f.isch>120){
      add("custodiol",4,"Ишемия >120 мин: Кустодиол обязателен — защита 3–4 ч");
      con("calafiore","Ишемия >120 мин: Calafiore ПРОТИВОПОКАЗАН");
      if(!ckdSevere) con("delNido","Ишемия >120 мин: Del Nido НЕ РЕКОМЕНДОВАН — превышен лимит 120 мин");
      warn("⚠️ Ишемия >120 мин: контроль Hct, DO₂, температуры перфузата каждые 30 мин");
    } else if(f.isch>60){
      add("custodiol",2,"Ишемия 60–120 мин: Кустодиол оптимален");
      if(!ckdSevere) add("delNido",2,"Ишемия 60–120 мин: Del Nido — одна доза покрывает");
      con("calafiore","Ишемия >60 мин: Calafiore НЕ РЕКОМЕНДОВАН — превышен лимит 60 мин");
    } else {
      add("custodiol",1,"Ишемия ≤60 мин: Кустодиол избыточен по объёму, но применим");
      if(!ckdSevere) add("delNido",1,"Ишемия ≤60 мин: Del Nido — одна доза достаточна");
    }
  }

  // ── ТЕМПЕРАТУРА ─────────────────────────────────────────────────────────
  if(!opcab && !forceCustodiol){
    if(f.temp==="norm"){
      if(f.op==="cabg" && f.isch<=60 && !ckdSevere){
        add("calafiore",2,"Нормотермия + АКШ ≤60 мин: Calafiore — тёплые редозы каждые 20–25 мин");
      }
      if(!ckdSevere) sub("delNido",1,"Нормотермия: Del Nido менее оптимален");
      con("custodiol","Нормотермия: Кустодиол не предназначен");
    } else if(f.temp==="mild"){
      if(!ckdSevere) add("delNido",1,"Умеренная гипотермия 32–34°C: Del Nido оптимален");
      add("custodiol",1,"Умеренная гипотермия: Кустодиол применим");
      if(f.op==="cabg"&&f.isch<=60&&!ckdSevere) add("calafiore",1,"Умеренная гипотермия + АКШ ≤60 мин: Calafiore приемлем");
    } else if(f.temp==="moderate"){
      if(!ckdSevere) add("delNido",2,"Гипотермия 28–32°C: Del Nido оптимален");
      add("custodiol",2,"Гипотермия 28–32°C: Кустодиол оптимален");
    } else {
      add("custodiol",2,"Глубокая гипотермия: Кустодиол — максимальная защита");
      if(!ckdSevere) add("delNido",1,"Глубокая гипотермия: Del Nido совместим");
    }
  }

  // ── СКФ — расширенные предупреждения (С3) ───────────────────────────────
  // С4–С5 уже обработан выше как жёсткое противопоказание
  if(!ckdSevere){
    if(f.gfr<60){
      sub("calafiore",1,"СКФ 30–60 (ХБП С3): Calafiore — контроль K+ при повторных редозах");
      warn("⚠️ ХБП С3 (СКФ "+f.gfr+"): контроль электролитов на ИК каждые 30 мин");
    }
  }

  // ── СОПУТСТВУЮЩИЕ ───────────────────────────────────────────────────────
  if(f.dm){
    if(!ckdSevere) add("delNido",1,"СД: Del Nido — нет глюкозы в составе (Ионоплазм В)");
    add("custodiol",1,"СД: Кустодиол — гистидиновый буфер, нет глюкозы");
    warn("⚠️ СД: гликемия 6–10 ммоль/л на ИК, глюкозо-инсулиновая инфузия при необходимости");
  }
  if(f.mi){
    if(!ckdSevere) add("delNido",2,"Постинфарктный: Del Nido — лидокаин стабилизирует зону некроза, снижает риск аритмий");
    add("custodiol",1,"Постинфарктный: Кустодиол применим");
    warn("⚠️ Постинфарктный кардиосклероз: комбинированный антеградно-ретроградный путь доставки");
  }
  if(f.ped){
    if(!ckdSevere) add("delNido",4,"Педиатрия: Del Nido — создан специально для детской КХ");
    con("calafiore","Педиатрия: Calafiore не валидирован у детей");
    add("custodiol",1,"Педиатрия: Кустодиол применим, Del Nido предпочтительнее");
    warn("⚠️ Педиатрия: Del Nido 20 мл/кг, температура перфузата 4°C, вес ≤20 кг — коррекция объёма");
  }
  if(f.hf){
    add("custodiol",2,"ХСН: Кустодиол — защита дилатированного миокарда, нет перегрузки K+");
    if(!ckdSevere) add("delNido",2,"ХСН: Del Nido — лидокаин+магний при ремоделировании");
    sub("calafiore",2,"ХСН: Calafiore — риск гиперкалиемии при задержке жидкости и снижении СКФ");
    warn("⚠️ ХСН: дилатированная КМП — увеличить объём кардиоплегии; готовность к ВАБК/ЭКМО");
  }
  if(f.ckd){
    sub("calafiore",2,"ХБП: Calafiore — высокий риск гиперкалиемии при многократных редозах");
    if(!ckdSevere) add("delNido",1,"ХБП: Del Nido — минимальная нагрузка K+ (2 мэкв)");
    add("custodiol",1,"ХБП: Кустодиол — однократный болюс снижает нагрузку K+");
    warn("⚠️ ХБП: мониторинг K+ и Mg²+, ультрафильтрация по показаниям");
  }
  if(f.athero){
    add("custodiol",1,"Атеросклероз аорты: Кустодиол — ретроградный путь при атероматозной аорте");
    warn("⚠️ Атеросклероз аорты: минимизировать манипуляции на восходящей аорте; ЭпиАо-УЗИ до канюляции");
  }
  if(f.prev_cardiac){
    add("custodiol",2,"Ранее операция на сердце: Кустодиол — ретроградный путь надёжен при спайках");
    if(!ckdSevere) add("delNido",f.isch<=120?1:0,"Ранее операция: Del Nido при ишемии ≤120 мин");
    sub("calafiore",2,"Ранее операция: Calafiore — ограничен при повторных вмешательствах");
    warn("⚠️ Повторная операция: ретроградное введение через катетер в КС; оценка спаечного процесса");
  }

  // ── МИНИ-ОПЕРАЦИИ: вакуум ────────────────────────────────────────────────
  if(miniOp && !forceCustodiol){
    if(f.vacuum){
      if(!ckdSevere) add("delNido",1,"VACS активирован: Del Nido + вакуум — оптимальное распределение при мини-доступе");
      add("custodiol",1,"VACS активирован: Кустодиол + вакуум — надёжная защита");
      warn("🔧 VACS: контроль давления в системе ≤200 мм рт.ст., предотвратить воздушную эмболию");
    } else {
      warn("⚠️ Мини-доступ без VACS: высокий риск неравномерного распределения кардиоплегии — VACS настоятельно рекомендован");
    }
  }

  // ── OPCAB-ветка ─────────────────────────────────────────────────────────
  if(opcab){
    s.calafiore=0; s.delNido=0; s.custodiol=0;
    r.calafiore=["OPCAB: кардиоплегия не применяется"];
    r.delNido=["OPCAB: стабилизатор миокарда + интракоронарный шунт — основная техника"];
    r.custodiol=["OPCAB: Кустодиол не показан"];
    w=[];
    w.push("✅ OPCAB: стабилизатор Medtronic Octopus или аналог; интракоронарные шунты; мониторинг ST в реальном времени");
    if(f.hr>=90) w.push("💊 ЧСС "+f.hr+" уд/мин при OPCAB: эсмолол или метопролол для снижения ЧСС <70 уд/мин — улучшение условий шунтирования");
  }

  // ── Финальная нормализация: Calafiore и Del Nido при ХБП С4–С5 ──────────
  // Гарантируем нулевые очки и блокируем победу
  if(ckdSevere){
    s.calafiore=0;
    s.delNido=0;
    if(!r.calafiore.some(function(x){return x.indexOf("ПРОТИВОПОКАЗАН")!==-1;}))
      r.calafiore.push("Calafiore обнулён: ХБП С4–С5 — абсолютное противопоказание");
    if(!r.delNido.some(function(x){return x.indexOf("ПРОТИВОПОКАЗАН")!==-1;}))
      r.delNido.push("Del Nido обнулён: ХБП С4–С5 — абсолютное противопоказание");
  }

  // ── Нормализация Calafiore: убрать, если не АКШ или ишемия > 60 ─────────
  if(!opcab && !forceCustodiol && !ckdSevere){
    var calAllowed = (f.op==="cabg" && f.isch<=60);
    if(!calAllowed){
      if(s.calafiore>0){
        s.calafiore=0;
        r.calafiore.push("Calafiore исключён: применяется только при АКШ с ишемией ≤60 мин и малыми окклюзиями");
      }
    }
  }

  var total=s.calafiore+s.delNido+s.custodiol||1;
  var pct={};
  Object.keys(s).forEach(function(k){pct[k]=Math.round(s[k]/total*100);});
  var winner;
  if(opcab) winner="delNido";
  else if(forceCustodiol||ckdSevere) winner="custodiol";
  else winner=Object.keys(s).sort(function(a,b){return s[b]-s[a];})[0];
  return{s:s,pct:pct,r:r,w:w,ci:ci,winner:winner,opcab:opcab,miniOp:miniOp,forceCustodiol:forceCustodiol,ckdSevere:ckdSevere};
}

function el(tag,attrs,kids){
  var e=document.createElement(tag);
  if(attrs){Object.keys(attrs).forEach(function(k){var v=attrs[k];if(k==="style"&&typeof v==="object"){Object.assign(e.style,v);}else if(k==="cls"){e.className=v;}else if(k.slice(0,2)==="on"){e.addEventListener(k.slice(2),v);}else{e.setAttribute(k,v);}});}
  if(kids){(Array.isArray(kids)?kids:[kids]).forEach(function(c){if(c==null||c===false||c===undefined)return;if(typeof c==="string"){e.appendChild(document.createTextNode(c));}else{e.appendChild(c);}});}
  return e;
}
function ht(html){var d=document.createElement("div");d.innerHTML=html;return d;}

    var wb=el("div",{style:{marginBottom:"16px",padding:"16px",borderRadius:"12px",background:"rgba(240,180,41,.07)",border:"1px solid rgba(240,180,41,.3)"}});
    wb.appendChild(ht("<div style='font-size:10px;color:#f0b429;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px'>Клинические рекомендации</div>"));
    res.w.forEach(function(ww){wb.appendChild(ht("<div style='font-size:13px;color:rgba(255,255,255,.7);margin-bottom:6px;line-height:1.5'>"+ww+"</div>"));});
    wrap.appendChild(wb);
  }

  var hasCI=Object.keys(res.ci).some(function(k){return res.ci[k].length>0;});
  if(hasCI){
    var cb=el("div",{style:{marginBottom:"16px",padding:"16px",borderRadius:"12px",background:"rgba(224,92,42,.07)",border:"1px solid rgba(224,92,42,.3)"}});
    cb.appendChild(ht("<div style='font-size:10px;color:#e05c2a;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px'>Ограничения / Противопоказания</div>"));
    Object.keys(res.ci).forEach(function(k){
      res.ci[k].forEach(function(c){
        cb.appendChild(ht("<div style='font-size:13px;color:rgba(255,255,255,.65);margin-bottom:5px'><span style=\"color:"+P[k].color+"\">"+P[k].icon+"</span> "+c+"</div>"));
      });
    });
    wrap.appendChild(cb);
  }

  var rb=el("div",{style:{borderRadius:"12px",overflow:"hidden",border:"1px solid rgba(255,255,255,.07)",marginBottom:"16px"}});
  rb.appendChild(ht("<div style='padding:12px 16px;background:rgba(255,255,255,.04);font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.1em'>Обоснование по методам</div>"));
  Object.keys(P).forEach(function(k){
    var pr=P[k];
    var sec=el("div",{style:{borderTop:"1px solid rgba(255,255,255,.05)",padding:"12px 16px"}});
    sec.appendChild(ht("<div style='color:"+pr.color+";font-weight:600;font-size:12px;margin-bottom:7px'>"+pr.icon+" "+pr.label+" ("+res.s[k]+" б.)</div>"));
    res.r[k].forEach(function(reason){
      sec.appendChild(ht("<span class='rline' style='border-left-color:"+pr.color+"44'>"+reason+"</span>"));
    });
    rb.appendChild(sec);
  });
  wrap.appendChild(rb);

  wrap.appendChild(el("button",{style:{width:"100%",padding:"12px",borderRadius:"10px",border:"1px solid rgba(255,255,255,.1)",background:"rgba(255,255,255,.04)",color:"rgba(255,255,255,.55)",fontSize:"13px"},onclick:function(){S.result=null;S.tab="input";render();}},"← Новый расчёт"));
  return wrap;
}

function renderModal(key){
  var pr=P[key];
  var ov=el("div",{cls:"overlay",onclick:function(){S.modal=null;render();}});
  var box=el("div",{cls:"modal",style:{border:"1px solid "+pr.color+"44"}});
  box.addEventListener("click",function(e){e.stopPropagation();});
  box.appendChild(ht("<div style='font-size:18px;font-weight:700;color:"+pr.color+";margin-bottom:18px'>"+pr.icon+" "+pr.label+"</div>"));
  box.appendChild(ht("<div style='font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px'>Состав раствора</div>"));
  pr.comp.forEach(function(c){
    box.appendChild(ht("<div style='display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px'><span style='color:rgba(255,255,255,.45)'>"+c[0]+"</span><span style='color:#fff;font-weight:500'>"+c[1]+"</span></div>"));
  });
  box.appendChild(ht("<div style='font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.1em;margin-top:16px;margin-bottom:8px'>Дозирование</div>"));
  pr.dos.forEach(function(d){
    box.appendChild(ht("<div style='padding:10px 12px;margin-bottom:8px;border-radius:8px;background:"+pr.color+"11;border:1px solid "+pr.color+"33'><div style='color:"+pr.color+";font-weight:600;font-size:12px;margin-bottom:4px'>"+d[0]+"</div><div style='font-size:13px;color:#fff'>Доза: <b>"+d[1]+"</b></div><div style='font-size:12px;color:rgba(255,255,255,.5)'>"+d[2]+"</div></div>"));
  });
  var grid=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginTop:"4px"}});
  var advD=el("div");
  advD.appendChild(ht("<div style='font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;margin-bottom:8px'>✅ Преимущества</div>"));
  pr.adv.forEach(function(a){advD.appendChild(ht("<div style='font-size:12px;color:rgba(255,255,255,.65);margin-bottom:4px'>• "+a+"</div>"));});
  var limD=el("div");
  limD.appendChild(ht("<div style='font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;margin-bottom:8px'>⚠️ Ограничения</div>"));
  pr.lim.forEach(function(l){limD.appendChild(ht("<div style='font-size:12px;color:rgba(255,255,255,.45);margin-bottom:4px'>• "+l+"</div>"));});
  grid.appendChild(advD);grid.appendChild(limD);
  box.appendChild(grid);
  box.appendChild(el("button",{style:{marginTop:"18px",width:"100%",padding:"10px",borderRadius:"8px",background:pr.color+"33",color:pr.color,fontWeight:"600",fontSize:"13px"},onclick:function(){S.modal=null;render();}},"Закрыть"));
  ov.appendChild(box);
  return ov;
}

render();
</script>
</body>
</html>
