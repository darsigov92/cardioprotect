<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CardioProtect DSS v2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080c14;color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh}
select{background:#0f1520;color:#fff;border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:10px 14px;width:100%;font-size:13px;outline:none;-webkit-appearance:none}
input[type=range]{width:100%;accent-color:#2a7fe0}
button{cursor:pointer;font-family:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.card{padding:16px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);margin-bottom:16px}
.section-head{font-size:10px;color:rgba(255,255,255,0.28);text-transform:uppercase;letter-spacing:.12em;margin-bottom:14px}
.tab-btn{flex:1;padding:9px;border-radius:8px;border:none;font-size:13px;font-weight:600;transition:all .3s;background:transparent;color:rgba(255,255,255,0.38)}
.tab-btn.active{background:rgba(255,255,255,0.12);color:#fff}
.run-btn{width:100%;padding:16px;border-radius:12px;border:none;background:linear-gradient(135deg,#2a7fe0,#2ac47f);color:#fff;font-size:15px;font-weight:700;letter-spacing:.04em;box-shadow:0 4px 30px rgba(42,127,224,0.4)}
.chip{padding:6px 13px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid;background:transparent}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#0f1117;border-radius:16px;padding:20px;max-width:500px;width:100%;max-height:88vh;overflow-y:auto}
.score-bar-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(0.4,0,.2,1)}
.reason-item{font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:4px;padding-left:12px;border-left:2px solid rgba(255,255,255,0.15)}
label.check{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;user-select:none}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const PROTOCOLS = {
  calafiore:{
    label:"Calafiore (тёплая кровяная)",color:"#e05c2a",icon:"🩸",
    composition:[
      {n:"Основа",v:"Аутологичная кровь (4:1 кровь:кристаллоид)"},
      {n:"KCl индукция",v:"20 мэкв/л"},
      {n:"KCl поддержание",v:"8 мэкв/л"},
      {n:"NaHCO₃",v:"по BE"},
      {n:"Температура",v:"37°C или 29–32°C"},
      {n:"Осмолярность",v:"~340 мОсм/кг"}
    ],
    dosing:[
      {phase:"Индукция",dose:"10–15 мл/кг",note:"давл. 80–100 мм рт.ст., до остановки"},
      {phase:"Редозирование",dose:"5–10 мл/кг",note:"каждые 20–25 мин"},
      {phase:"Реперфузия",dose:"2–4 мл/кг",note:"тёплая, без K+, 50–60 мм рт.ст."}
    ],
    adv:["Физиологичная оксигенация миокарда","Гибкость дозирования","Нет гемодилюции","Идеален при нормотермии"],
    lim:["Частые редозы при длительных операциях","Нагрузка K+ при ХБП","Технически сложнее"]
  },
  delNido:{
    label:"Del Nido",color:"#2a7fe0",icon:"💎",
    composition:[
      {n:"Плазмалит A",v:"1000 мл"},
      {n:"Кровь",v:"250 мл (4:1)"},
      {n:"MgSO₄",v:"2 г (4 мл 50%)"},
      {n:"Lidocaine",v:"130 мг (6,5 мл 2%)"},
      {n:"KCl",v:"2 мэкв"},
      {n:"NaHCO₃",v:"13 мэкв"},
      {n:"Mannitol",v:"3,26 г"},
      {n:"Температура",v:"4–8°C"}
    ],
    dosing:[
      {phase:"Единственная доза",dose:"20 мл/кг (max 1000 мл)",note:"200–250 мм рт.ст., 3–5 мин"},
      {phase:"Редоз при ишемии >90 мин",dose:"10 мл/кг",note:"50% от первичной дозы"}
    ],
    adv:["Одна доза покрывает 90–120 мин","Лидокаин: стабилизация мембраны","Магний: антагонист Ca²+","Идеален при педиатрии и АВР"],
    lim:["Ограниченный опыт >120 мин","Не для нормотермии","Объём 1000 мл — нагрузка"]
  },
  custodiol:{
    label:"Кустодиол (HTK)",color:"#2ac47f",icon:"🧬",
    composition:[
      {n:"Гистидин (буфер)",v:"198 ммоль/л"},
      {n:"Триптофан",v:"2 ммоль/л"},
      {n:"Кетоглутарат",v:"1 ммоль/л"},
      {n:"Mannitol",v:"30 ммоль/л"},
      {n:"KCl",v:"9 мэкв/л"},
      {n:"MgCl₂",v:"4 ммоль/л"},
      {n:"Температура",v:"4–6°C"}
    ],
    dosing:[
      {phase:"Взрослые",dose:"20–30 мл/кг (мин. 1000 мл)",note:"30–50 мм рт.ст., 6–8 мин"},
      {phase:"Повторная защита >180 мин",dose:"500–1000 мл",note:"при необходимости"}
    ],
    adv:["Защита до 3–4 ч без редозов","Стандарт при аортальной хирургии","Надёжен при ретроградном введении"],
    lim:["Большой объём → гемодилюция","Не для нормотермии","Нет O₂-доставки (кристаллоид)"]
  }
};

// ── CLINICAL ENGINE ───────────────────────────────────────────────────────────
function calcScore(f) {
  var s={calafiore:0,delNido:0,custodiol:0};
  var r={calafiore:[],delNido:[],custodiol:[]};
  var w=[], ci={calafiore:[],delNido:[],custodiol:[]};
  function add(k,n,txt){s[k]+=n;r[k].push(txt);}
  function contra(k,txt){ci[k].push(txt);}

  // Тип операции
  if(f.opType==="cabg"){add("calafiore",3,"АКШ: частые редозы совместимы с многососудистым шунтированием");add("delNido",2,"АКШ: DN применим, контроль DO₂ при длительной ишемии");add("custodiol",1,"АКШ: Кустодиол возможен, редозирование затруднено");}
  else if(f.opType==="avr"){add("delNido",3,"Протезирование АК: DN оптимален — одна доза, отличный доступ");add("custodiol",3,"Протезирование АК: Кустодиол — стандарт при изолированной патологии АК");add("calafiore",1,"Протезирование АК: Calafiore применим при сочетанной патологии");}
  else if(f.opType==="mvr"){add("calafiore",2,"Митральная хирургия: Calafiore — гибкость при длительных операциях");add("delNido",2,"Митральная хирургия: DN при умеренной продолжительности");add("custodiol",2,"Митральная хирургия: Кустодиол при изолированной патологии МК");}
  else if(f.opType==="combined"){add("calafiore",3,"Сочетанная операция: Calafiore — гибкое управление ишемией");add("delNido",1,"Сочетанная: DN — риск при >120 мин");add("custodiol",1,"Сочетанная: Кустодиол — однократность ограничивает гибкость");}
  else if(f.opType==="aorta"){add("custodiol",4,"Аортальная хирургия: Кустодиол — золотой стандарт");add("delNido",2,"Аортальная: DN при умеренной продолжительности");contra("calafiore","Аортальная хирургия: антеградная доставка технически затруднена");}
  else if(f.opType==="redo"){add("custodiol",3,"Повторная операция: Кустодиол — ретроградное введение надёжно при спайках");add("calafiore",2,"Повторная: Calafiore — ретроградный путь");add("delNido",1,"Повторная: DN — ограниченный опыт");}

  // ФВ ЛЖ
  if(f.ef<30){add("delNido",3,"ФВ <30%: DN — лидокаин+магний, защита гибернированного миокарда");add("custodiol",2,"ФВ <30%: Кустодиол — гипотермическая защита");add("calafiore",1,"ФВ <30%: Calafiore — тщательный контроль редозирования");w.push("⚠️ Критическая дисфункция ЛЖ: рассмотреть ВАБК, мониторинг лактата");}
  else if(f.ef<45){add("delNido",2,"ФВ 30–45%: DN — надёжная защита при умеренной дисфункции");add("calafiore",1,"ФВ 30–45%: Calafiore при частом редозировании");add("custodiol",1,"ФВ 30–45%: Кустодиол — приемлемо");}
  else{add("calafiore",2,"ФВ ≥45%: Calafiore — оптимально при сохранной функции");add("delNido",1,"ФВ ≥45%: DN применим");add("custodiol",1,"ФВ ≥45%: Кустодиол применим");}

  // ГЛЖ
  if(f.lvm==="severe"){add("delNido",3,"Выраженная ГЛЖ: DN — лидокаин критически важен");add("custodiol",2,"Выраженная ГЛЖ: Кустодиол — глубокая гипотермия");add("calafiore",1,"Выраженная ГЛЖ: Calafiore — интервалы редозирования 15–20 мин");w.push("⚠️ ГЛЖ >200 г/м²: увеличить объём кардиоплегии");}
  else if(f.lvm==="moderate"){add("delNido",2,"Умеренная ГЛЖ: DN предпочтителен");add("calafiore",1,"Умеренная ГЛЖ: Calafiore с укороченными интервалами");add("custodiol",1,"Умеренная ГЛЖ: Кустодиол применим");}
  else{add("calafiore",1,"Норма ГЛЖ: стандартный Calafiore");add("delNido",1,"Норма ГЛЖ: DN применим");add("custodiol",1,"Норма ГЛЖ: Кустодиол применим");}

  // Время ишемии
  if(f.isch>120){add("custodiol",4,"Ишемия >120 мин: Кустодиол — защита до 3–4 ч");add("delNido",2,"Ишемия >120 мин: DN — второй болюс при строгом контроле");s.calafiore=Math.max(0,s.calafiore-1);r.calafiore.push("Ишемия >120 мин: Calafiore — высокая нагрузка Na при частых редозах");w.push("⚠️ Длительная ишемия: контроль Hct, DO₂, температуры перфузата");}
  else if(f.isch>80){add("custodiol",2,"Ишемия 80–120 мин: Кустодиол комфортен");add("delNido",2,"Ишемия 80–120 мин: DN — одна доза покрывает");add("calafiore",1,"Ишемия 80–120 мин: Calafiore — 2–3 редоза");}
  else{add("calafiore",2,"Ишемия <80 мин: Calafiore — 1–2 редоза оптимально");add("delNido",2,"Ишемия <80 мин: DN — одна доза достаточна");add("custodiol",1,"Ишемия <80 мин: Кустодиол избыточен по объёму");}

  // АР
  if(f.ar==="severe"){add("custodiol",3,"АР 3–4 ст.: Кустодиол — ретроградная перфузия");add("delNido",2,"АР 3–4 ст.: DN — прямая канюляция устьев");contra("calafiore","АР 3–4 ст.: антеградное введение неэффективно — вымывание в ЛЖ");w.push("⚠️ Тяжёлая АР: антеградный путь не рекомендован");}
  else if(f.ar==="moderate"){add("custodiol",1,"АР 2 ст.: предпочтителен ретроградный путь");add("delNido",1,"АР 2 ст.: DN с осторожностью");add("calafiore",1,"АР 2 ст.: Calafiore с ретроградным компонентом");}
  else{add("calafiore",1,"АР нет/1 ст.: антеградный путь надёжен");add("delNido",1,"АР нет/1 ст.: стандартное антеградное DN");add("custodiol",1,"АР нет/1 ст.: Кустодиол антеградно");}

  // СКФ
  if(f.gfr<30){s.calafiore=Math.max(0,s.calafiore-2);contra("calafiore","СКФ <30: высокая нагрузка K+ при редозах — риск гиперкалиемии");add("custodiol",1,"СКФ <30: Кустодиол — однократный болюс");add("delNido",1,"СКФ <30: DN — однократный болюс");w.push("⚠️ ХБП 4–5: мониторинг K+ каждые 30 мин, готовность к ультрафильтрации");}
  else if(f.gfr<60){s.calafiore=Math.max(0,s.calafiore-1);r.calafiore.push("СКФ 30–60: Calafiore — контроль K+");w.push("⚠️ ХБП 3: контроль электролитов");}

  // Сопутствующие
  if(f.dm){add("delNido",1,"СД: DN — нет глюкозы в составе");add("custodiol",1,"СД: Кустодиол — гистидиновый буфер");w.push("⚠️ СД: гликемия 6–10 ммоль/л на ИК, инсулин по протоколу");}
  if(f.mi){add("delNido",2,"Постинфарктный миокард: DN — лидокаин стабилизирует зону некроза");add("calafiore",1,"Постинфарктный: Calafiore — непрерывная защита");w.push("⚠️ Постинфарктный кардиосклероз: рассмотреть комбинированный путь доставки");}
  if(f.ped){add("delNido",4,"Педиатрия: Del Nido — разработан специально для детской КХ");contra("calafiore","Педиатрия: Calafiore не валидирован");add("custodiol",1,"Педиатрия: Кустодиол применим, но DN предпочтителен");w.push("⚠️ Педиатрия: DN 20 мл/кг, температура перфузата 4°C");}

  // Температура
  if(f.temp==="norm"){add("calafiore",2,"Нормотермия: Calafiore — тёплые редозы каждые 15–20 мин");s.delNido=Math.max(0,s.delNido-1);r.delNido.push("Нормотермия: DN менее оптимален");contra("custodiol","Нормотермия: Кустодиол не предназначен для нормотермии");}
  else if(f.temp==="mild"){add("calafiore",1,"Умеренная гипотермия: Calafiore комфортен");add("delNido",1,"Умеренная гипотермия: DN приемлем");add("custodiol",1,"Умеренная гипотермия: Кустодиол субоптимален");}
  else{add("custodiol",2,"Глубокая гипотермия: Кустодиол — максимальная защита");add("delNido",1,"Глубокая гипотермия: DN совместим");}

  Object.keys(s).forEach(k=>{if(s[k]<0)s[k]=0;});
  var total=s.calafiore+s.delNido+s.custodiol||1;
  var pct={calafiore:Math.round(s.calafiore/total*100),delNido:Math.round(s.delNido/total*100),custodiol:Math.round(s.custodiol/total*100)};
  var winner=Object.entries(s).sort((a,b)=>b[1]-a[1])[0][0];
  return{s,pct,r,w,ci,winner};
}

// ── STATE ─────────────────────────────────────────────────────────────────────
var state={
  tab:"input",
  modal:null,
  result:null,
  f:{opType:"cabg",ef:55,lvm:"none",isch:60,ar:"none",gfr:75,temp:"mild",dm:false,mi:false,ped:false}
};

// ── RENDER ────────────────────────────────────────────────────────────────────
function r(tag,attrs,children){
  var el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else if(k==="checked")el.checked=v;
    else if(k==="value")el.value=v;
    else el.setAttribute(k,v);
  });
  if(children){
    (Array.isArray(children)?children:[children]).forEach(c=>{
      if(c==null||c===false)return;
      el.appendChild(typeof c==="string"?document.createTextNode(c):c);
    });
  }
  return el;
}
function p(html,style){var el=document.createElement("p");el.innerHTML=html;if(style)Object.assign(el.style,style);return el;}
function div(style,children){return r("div",{style},children);}

function render(){
  var app=document.getElementById("app");
  app.innerHTML="";
  app.appendChild(buildApp());
}

function buildApp(){
  var wrap=div({minHeight:"100vh",background:"radial-gradient(ellipse 80% 60% at 50% 0%,#0d1f3c,#080c14 60%,#060809)",paddingBottom:"40px"});

  // Modal
  if(state.modal){wrap.appendChild(buildModal(state.modal));}

  // Header
  var hdr=div({padding:"26px 20px 0",textAlign:"center"});
  hdr.appendChild(p("<span style='font-size:9px;letter-spacing:.32em;color:rgba(255,255,255,.28);text-transform:uppercase'>ОКБ №1 · Тюмень · Перфузиология</span>"));
  hdr.appendChild(p("<span style='font-size:22px;font-weight:800;background:linear-gradient(135deg,#e05c2a,#2a7fe0,#2ac47f);-webkit-background-clip:text;-webkit-text-fill-color:transparent'>CardioProtect DSS v2</span>"));
  hdr.appendChild(p("<span style='font-size:12px;color:rgba(255,255,255,.3)'>Система поддержки выбора кардиоплегии</span>"));
  wrap.appendChild(hdr);

  // Protocol chips
  var chips=div({display:"flex",gap:"8px",padding:"14px 20px",justifyContent:"center",flexWrap:"wrap"});
  Object.entries(PROTOCOLS).forEach(([k,pr])=>{
    var btn=r("button",{className:"chip",style:{borderColor:pr.color+"55",color:pr.color},onClick:()=>{state.modal=k;render();}},pr.icon+" "+(k==="delNido"?"Del Nido":k==="calafiore"?"Calafiore":"Кустодиол")+" →");
    chips.appendChild(btn);
  });
  wrap.appendChild(chips);

  // Tabs
  var tabs=div({display:"flex",margin:"0 20px 16px",borderRadius:"10px",background:"rgba(255,255,255,.05)",padding:"4px"});
  [["input","⚙️ Параметры"],["result","📊 Результат"]].forEach(([t,label])=>{
    var btn=r("button",{className:"tab-btn"+(state.tab===t?" active":""),onClick:()=>{state.tab=t;render();}},label);
    tabs.appendChild(btn);
  });
  wrap.appendChild(tabs);

  var content=div({padding:"0 20px"});
  if(state.tab==="input")content.appendChild(buildInput());
  else content.appendChild(buildResult());
  wrap.appendChild(content);

  wrap.appendChild(p("<span style='font-size:9px;color:rgba(255,255,255,.18);display:block;text-align:center;padding:0 20px 16px'>CardioProtect DSS v2 · Только для поддержки клинических решений · Не заменяет суждение перфузиолога</span>"));
  return wrap;
}

function field(labelHtml,control){
  var wrap=div({marginBottom:"14px"});
  wrap.appendChild(p("<span style='font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px'>"+labelHtml+"</span>"));
  wrap.appendChild(control);
  return wrap;
}

function buildInput(){
  var f=state.f;
  var wrap=div({});

  // Операция
  var sec1=div({className:"card"});
  sec1.appendChild(p("<span class='section-head'>Тип операции</span>"));
  var sel=r("select",{value:f.opType,onChange:e=>{state.f.opType=e.target.value;render();}});
  [["cabg","АКШ (изолированное)"],["avr","Протезирование аортального клапана"],["mvr","Пластика/протезирование митрального клапана"],["combined","Сочетанная (АКШ + клапан)"],["aorta","Хирургия аорты"],["redo","Повторная операция (redo)"]].forEach(([v,t])=>{
    sel.appendChild(r("option",{value:v},t));
  });
  sel.value=f.opType;
  sec1.appendChild(sel);
  wrap.appendChild(sec1);

  // ФВ + ГЛЖ
  var sec2=div({className:"card"});
  sec2.appendChild(p("<span class='section-head'>Функция левого желудочка</span>"));
  var efCol=f.ef<30?"#e05c2a":f.ef<45?"#f0b429":"#2ac47f";
  sec2.appendChild(field("ФВ ЛЖ: <b style='color:"+efCol+"'>"+f.ef+"%</b>",
    r("input",{type:"range",min:10,max:75,value:f.ef,style:{accentColor:efCol},onInput:e=>{state.f.ef=+e.target.value;render();}})));
  var lvmSel=r("select",{onChange:e=>{state.f.lvm=e.target.value;render();}});
  [["none","Нет / минимальная"],["moderate","Умеренная (115–150 г/м²)"],["severe","Выраженная (>150 г/м²)"]].forEach(([v,t])=>lvmSel.appendChild(r("option",{value:v},t)));
  lvmSel.value=f.lvm;
  sec2.appendChild(field("Гипертрофия ЛЖ",lvmSel));
  wrap.appendChild(sec2);

  // АР
  var sec3=div({className:"card"});
  sec3.appendChild(p("<span class='section-head'>Клапанная патология</span>"));
  var arSel=r("select",{onChange:e=>{state.f.ar=e.target.value;render();}});
  [["none","Нет / 1 ст."],["moderate","2 ст. (умеренная)"],["severe","3–4 ст. (тяжёлая)"]].forEach(([v,t])=>arSel.appendChild(r("option",{value:v},t)));
  arSel.value=f.ar;
  sec3.appendChild(field("Аортальная регургитация",arSel));
  wrap.appendChild(sec3);

  // Перфузия
  var sec4=div({className:"card"});
  sec4.appendChild(p("<span class='section-head'>Параметры перфузии</span>"));
  var iCol=f.isch>120?"#e05c2a":f.isch>80?"#f0b429":"#2ac47f";
  sec4.appendChild(field("Время ишемии аорты: <b style='color:"+iCol+"'>"+f.isch+" мин</b>",
    r("input",{type:"range",min:20,max:240,step:5,value:f.isch,style:{accentColor:iCol},onInput:e=>{state.f.isch=+e.target.value;render();}})));
  var tSel=r("select",{onChange:e=>{state.f.temp=e.target.value;render();}});
  [["norm","Нормотермия (36–37°C)"],["mild","Умеренная гипотермия (32–34°C)"],["moderate","Гипотермия (28–32°C)"],["deep","Глубокая гипотермия (<28°C)"]].forEach(([v,t])=>tSel.appendChild(r("option",{value:v},t)));
  tSel.value=f.temp;
  sec4.appendChild(field("Температурный режим ИК",tSel));
  wrap.appendChild(sec4);

  // СКФ + флаги
  var sec5=div({className:"card"});
  sec5.appendChild(p("<span class='section-head'>Сопутствующая патология</span>"));
  var gCol=f.gfr<30?"#e05c2a":f.gfr<60?"#f0b429":"#2ac47f";
  sec5.appendChild(field("СКФ: <b style='color:"+gCol+"'>"+f.gfr+" мл/мин/1.73м²</b>",
    r("input",{type:"range",min:10,max:120,value:f.gfr,style:{accentColor:gCol},onInput:e=>{state.f.gfr=+e.target.value;render();}})));
  var checks=div({display:"flex",gap:"16px",flexWrap:"wrap",marginTop:"6px"});
  [["dm","🍬 СД"],["mi","❤️‍🩹 Перенесённый ИМ"],["ped","👶 Педиатрия"]].forEach(([k,lbl])=>{
    var lel=r("label",{className:"check",style:{color:f[k]?"#fff":"rgba(255,255,255,.45)"}});
    var cb=r("input",{type:"checkbox",style:{accentColor:"#2a7fe0",width:"16px",height:"16px"},onChange:e=>{state.f[k]=e.target.checked;render();}});
    cb.checked=f[k];
    lel.appendChild(cb);
    lel.appendChild(document.createTextNode(" "+lbl));
    checks.appendChild(lel);
  });
  sec5.appendChild(checks);
  wrap.appendChild(sec5);

  wrap.appendChild(r("button",{className:"run-btn",onClick:()=>{state.result=calcScore(state.f);state.tab="result";render();}},"⚡ Рассчитать рекомендацию"));
  return wrap;
}

function buildResult(){
  if(!state.result){
    var empty=div({textAlign:"center",padding:"60px 0",color:"rgba(255,255,255,.25)"});
    empty.appendChild(p("<span style='font-size:48px'>🫀</span>"));
    empty.appendChild(p("<span style='font-size:14px'>Введите параметры и нажмите «Рассчитать»</span>"));
    return empty;
  }
  var res=state.result;
  var w=res.winner;
  var wp=PROTOCOLS[w];
  var wrap=div({});

  // Winner card
  var wc=div({padding:"20px",borderRadius:"14px",marginBottom:"18px",background:"linear-gradient(135deg,"+wp.color+"22,"+wp.color+"11)",border:"1.5px solid "+wp.color+"66",boxShadow:"0 0 40px "+wp.color+"44"});
  wc.appendChild(p("<span style='font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.15em'>Рекомендованный метод</span>"));
  wc.appendChild(p("<span style='font-size:21px;font-weight:800;color:"+wp.color+"'>"+wp.icon+" "+wp.label+"</span>"));
  wc.appendChild(p("<span style='font-size:13px;color:rgba(255,255,255,.45)'>Индекс предпочтения: "+res.pct[w]+"% · "+res.s[w]+" баллов</span>"));
  var detBtn=r("button",{style:{marginTop:"14px",padding:"8px 16px",borderRadius:"8px",border:"1px solid "+wp.color+"66",background:wp.color+"22",color:wp.color,fontSize:"12px",fontWeight:"600"},onClick:()=>{state.modal=w;render();}},
    "Протокол дозирования →");
  wc.appendChild(detBtn);
  wrap.appendChild(wc);

  // Score bars
  Object.entries(PROTOCOLS).forEach(([k,pr])=>{
    var isWinner=k===w;
    var sb=div({padding:"14px 16px",borderRadius:"12px",marginBottom:"10px",background:isWinner?"linear-gradient(135deg,"+pr.color+"22,"+pr.color+"11)":"rgba(255,255,255,.03)",border:"1px solid "+(isWinner?pr.color+"88":"rgba(255,255,255,.08)"),boxShadow:isWinner?"0 0 20px "+pr.color+"44":"none"});
    var row=div({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"});
    row.appendChild(p("<span style='color:"+(isWinner?pr.color:"rgba(255,255,255,.6)")+";font-weight:"+(isWinner?"700":"400")+";font-size:13px'>"+pr.icon+" "+pr.label+"</span>"));
    row.appendChild(p("<span style='color:"+pr.color+";font-weight:700;font-size:18px'>"+res.pct[k]+"%</span>"));
    sb.appendChild(row);
    var track=div({height:"6px",background:"rgba(255,255,255,.08)",borderRadius:"3px",overflow:"hidden"});
    var fill=div({height:"100%",borderRadius:"3px",background:"linear-gradient(90deg,"+pr.color+"aa,"+pr.color+")",boxShadow:"0 0 10px "+pr.color+"44"});
    fill.style.width=res.pct[k]+"%";
    track.appendChild(fill);
    sb.appendChild(track);
    wrap.appendChild(sb);
  });

  // Warnings
  if(res.w.length){
    var wb=div({marginBottom:"16px",padding:"16px",borderRadius:"12px",background:"rgba(240,180,41,.07)",border:"1px solid rgba(240,180,41,.3)"});
    wb.appendChild(p("<span style='font-size:10px;color:#f0b429;text-transform:uppercase;letter-spacing:.1em'>Клинические предупреждения</span>"));
    res.w.forEach(ww=>wb.appendChild(p("<span style='font-size:13px;color:rgba(255,255,255,.7);display:block;margin-top:6px'>"+ww+"</span>")));
    wrap.appendChild(wb);
  }

  // Contraindications
  var hasCI=Object.values(res.ci).some(v=>v.length>0);
  if(hasCI){
    var cb2=div({marginBottom:"16px",padding:"16px",borderRadius:"12px",background:"rgba(224,92,42,.07)",border:"1px solid rgba(224,92,42,.3)"});
    cb2.appendChild(p("<span style='font-size:10px;color:#e05c2a;text-transform:uppercase;letter-spacing:.1em'>Ограничения / Противопоказания</span>"));
    Object.entries(res.ci).forEach(([method,items])=>{
      items.forEach(c=>{
        cb2.appendChild(p("<span style='font-size:13px;color:rgba(255,255,255,.65);display:block;margin-top:6px'><span style="color:"+PROTOCOLS[method].color+"">"+PROTOCOLS[method].icon+"</span> "+c+"</span>"));
      });
    });
    wrap.appendChild(cb2);
  }

  // Reasons
  var rb=div({borderRadius:"12px",overflow:"hidden",border:"1px solid rgba(255,255,255,.07)",marginBottom:"16px"});
  rb.appendChild(p("<span style='display:block;padding:12px 16px;background:rgba(255,255,255,.04);font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.1em'>Обоснование по методам</span>"));
  Object.entries(PROTOCOLS).forEach(([k,pr])=>{
    var sec=div({borderTop:"1px solid rgba(255,255,255,.05)",padding:"12px 16px"});
    sec.appendChild(p("<span style='color:"+pr.color+";font-weight:600;font-size:12px'>"+pr.icon+" "+pr.label+" ("+res.s[k]+" б.)</span>"));
    res.r[k].forEach(reason=>{
      var ri=div({className:"reason-item",style:{borderLeftColor:pr.color+"44"}});
      ri.appendChild(document.createTextNode(reason));
      sec.appendChild(ri);
    });
    rb.appendChild(sec);
  });
  wrap.appendChild(rb);

  wrap.appendChild(r("button",{style:{width:"100%",padding:"12px",borderRadius:"10px",border:"1px solid rgba(255,255,255,.1)",background:"rgba(255,255,255,.04)",color:"rgba(255,255,255,.55)",fontSize:"13px"},onClick:()=>{state.result=null;state.tab="input";render();}},
    "← Новый расчёт"));
  return wrap;
}

function buildModal(key){
  var pr=PROTOCOLS[key];
  var ov=div({className:"modal-overlay",onClick:()=>{state.modal=null;render();}});
  var box=div({className:"modal-box",style:{border:"1px solid "+pr.color+"44"}});
  box.addEventListener("click",e=>e.stopPropagation());

  box.appendChild(p("<span style='font-size:18px;font-weight:700;color:"+pr.color+";display:block;margin-bottom:18px'>"+pr.icon+" "+pr.label+"</span>"));

  box.appendChild(p("<span style='font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.1em'>Состав раствора</span>"));
  pr.composition.forEach(c=>{
    var row=div({display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,.05)"});
    row.appendChild(p("<span style='font-size:13px;color:rgba(255,255,255,.45)'>"+c.n+"</span>"));
    row.appendChild(p("<span style='font-size:13px;color:#fff;font-weight:500'>"+c.v+"</span>"));
    box.appendChild(row);
  });

  box.appendChild(p("<span style='font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.1em;display:block;margin-top:16px;margin-bottom:8px'>Дозирование</span>"));
  pr.dosing.forEach(d=>{
    var dc=div({padding:"10px 12px",marginBottom:"8px",borderRadius:"8px",background:pr.color+"11",border:"1px solid "+pr.color+"33"});
    dc.appendChild(p("<span style='color:"+pr.color+";font-weight:600;font-size:12px'>"+d.phase+"</span>"));
    dc.appendChild(p("<span style='font-size:13px;color:#fff'>Доза: <b>"+d.dose+"</b></span>"));
    dc.appendChild(p("<span style='font-size:12px;color:rgba(255,255,255,.5)'>"+d.note+"</span>"));
    box.appendChild(dc);
  });

  var grid=div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginTop:"4px"});
  var adv=div({});
  adv.appendChild(p("<span style='font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;display:block;margin-bottom:8px'>✅ Преимущества</span>"));
  pr.adv.forEach(a=>adv.appendChild(p("<span style='font-size:12px;color:rgba(255,255,255,.65);display:block;margin-bottom:4px'>• "+a+"</span>")));
  var lim=div({});
  lim.appendChild(p("<span style='font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;display:block;margin-bottom:8px'>⚠️ Ограничения</span>"));
  pr.lim.forEach(l=>lim.appendChild(p("<span style='font-size:12px;color:rgba(255,255,255,.45);display:block;margin-bottom:4px'>• "+l+"</span>")));
  grid.appendChild(adv);grid.appendChild(lim);
  box.appendChild(grid);

  box.appendChild(r("button",{style:{marginTop:"18px",width:"100%",padding:"10px",borderRadius:"8px",border:"none",background:pr.color+"33",color:pr.color,fontWeight:"600",fontSize:"13px"},onClick:()=>{state.modal=null;render();}},"Закрыть"));
  ov.appendChild(box);
  return ov;
}

render();
</script>
</body>
</html>
